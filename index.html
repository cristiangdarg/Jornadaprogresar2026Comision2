<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Certificados</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-800 font-sans antialiased">

    <header class="bg-white border-b border-slate-200 sticky top-0 z-10 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 text-white p-2 rounded-lg shadow-md">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 14l9-5-9-5-9 5 9 5z" />
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z" />
                    </svg>
                </div>
                <div>
                    <h1 class="text-xl font-bold text-slate-900 tracking-tight">Certificados PROGRESAR | Comisión 2 | 29/06/2026</h1>
                    <p class="text-xs text-slate-500">Jornada Seguridad Digital y Ciberbullying </p>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <div class="mb-6 bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex flex-col sm:flex-row sm:items-center justify-between gap-4">
            <div class="relative flex-1 max-w-md">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </span>
                <input
                    type="text"
                    id="inputBusqueda"
                    placeholder="Buscar por apellido..."
                    class="w-full pl-10 pr-4 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all text-slate-700"
                />
            </div>
            <div class="text-sm text-slate-500 font-medium" id="contadorAlumnos"></div>
        </div>

        <div class="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 border-b border-slate-200 text-slate-600 text-xs font-semibold uppercase tracking-wider">
                            <th class="px-6 py-4 text-center w-16">ID</th>
                            <th class="px-6 py-4">DNI</th>
                            <th class="px-6 py-4">Apellido</th>
                            <th class="px-6 py-4">Nombre</th>
                            <th class="px-6 py-4 text-center w-48">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tablaCuerpo" class="divide-y divide-slate-100 text-sm text-slate-700">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const alumnosData = [
            { id: 1, dni: "49.206.694", apellido: "Figueroa", nombre: "Malena Valentina", pdf: "FigueroaMalenaValentina.pdf" },
            { id: 2, dni: "49.205.601", apellido: "Gomez", nombre: "Rosa Agostina", pdf: "GomezRosaAgostina.pdf" },
            { id: 3, dni: "49.898.177", apellido: "Alvarado", nombre: "Nerina Constanza", pdf: "AlvaradoNerinaConstanza.pdf" },
            { id: 4, dni: "51.153.862", apellido: "Farias", nombre: "Maximiliano Miguel", pdf: "FariasMaximilianoMiguel.pdf" },
            { id: 5, dni: "48.974.382", apellido: "Machuca", nombre: "Mia Alejandra", pdf: "MachucaMiaAlejandra.pdf" },
            { id: 6, dni: "49.939.518", apellido: "Ledesma", nombre: "Liz Ayelen", pdf: "LedesmaLizAyelen.pdf" },
            { id: 7, dni: "49.284.163", apellido: "Gonzalez", nombre: "Ana Mariel", pdf: "GonzalezAnaMariel.pdf" },
            { id: 8, dni: "50.332.652", apellido: "Santillan Ibarra", nombre: "Julieta Anahi", pdf: "SantillanIbarraJulietaAnahi.pdf" },
            { id: 9, dni: "49.395.016", apellido: "Diaz Gonzalez", nombre: "Luzmila Marisol", pdf: "DiazGonzalezLuzmilaMarisol.pdf" },
            { id: 10, dni: "50.214.542", apellido: "Coronel Figueroa", nombre: "Sofia Jasmin", pdf: "CoronelFigueroaSofiaJasmin.pdf" },
            { id: 11, dni: "49.939.465", apellido: "Torrez", nombre: "Narela Nahir", pdf: "TorrezNarelaNahir.pdf" },
            { id: 12, dni: "50.212.787", apellido: "Luna", nombre: "Aylen Milena", pdf: "LunaAylenMilena.pdf" },
            { id: 13, dni: "49.147.319", apellido: "Perez Leguizamon", nombre: "Luciana Guadalupe", pdf: "PerezLeguizamonLucianaGuadalupe.pdf" },
            { id: 14, dni: "49.205.558", apellido: "Perez", nombre: "Melody Yasmin", pdf: "PerezMelodyYasmin.pdf" },
            { id: 15, dni: "47.599.105", apellido: "Perez", nombre: "Gaston Andres", pdf: "PerezGastonAndres.pdf" },
            { id: 16, dni: "49.580.051", apellido: "Santillan", nombre: "Mauro Francisco", pdf: "SantillanMauroFrancisco.pdf" },
            { id: 17, dni: "50.212.726", apellido: "Ruiz", nombre: "Maria Virginia", pdf: "RuizMariaVirginia.pdf" },
            { id: 18, dni: "48.831.628", apellido: "Reinoso", nombre: "Lautaro E.", pdf: "ReinosoLautaroE.pdf" }
        ];

        const inputBusqueda = document.getElementById('inputBusqueda');
        const tablaCuerpo = document.getElementById('tablaCuerpo');
        const contadorAlumnos = document.getElementById('contadorAlumnos');

        function normalizarTexto(texto) {
            return texto.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        }

        function renderTabla(filtro = '') {
            const filtrados = alumnosData.filter(al => 
                normalizarTexto(al.apellido).includes(normalizarTexto(filtro))
            );

            contadorAlumnos.innerHTML = `Mostrando <span class="text-indigo-600 font-bold">${filtrados.length}</span> de ${alumnosData.length} alumnos`;

            if(filtrados.length === 0) {
                tablaCuerpo.innerHTML = `
                    <tr>
                        <td colSpan="5" class="px-6 py-12 text-center text-slate-400">
                            No se encontraron alumnos con el apellido "${filtro}"
                        </td>
                    </tr>`;
                return;
            }

            tablaCuerpo.innerHTML = filtrados.map(al => `
                <tr class="hover:bg-slate-50/70 transition-colors">
                    <td class="px-6 py-3.5 text-center font-medium text-slate-400">${al.id}</td>
                    <td class="px-6 py-3.5 font-mono text-slate-600">${al.dni}</td>
                    <td class="px-6 py-3.5 font-semibold text-slate-900">${al.apellido}</td>
                    <td class="px-6 py-3.5 text-slate-600">${al.nombre}</td>
                    <td class="px-6 py-3.5 text-center">
                        <a href="./pdfc2/${al.pdf}" download="${al.pdf}" class="inline-flex items-center gap-2 px-4 py-2 bg-indigo-50 hover:bg-indigo-100 text-indigo-600 rounded-lg text-xs font-bold transition-all border border-indigo-100">
                            Descargar Certificado
                        </a>
                    </td>
                </tr>
            `).join('');
        }

        inputBusqueda.addEventListener('input', (e) => renderTabla(e.target.value));
        
        // Carga inicial
        renderTabla();
    </script>
</body>
</html>
